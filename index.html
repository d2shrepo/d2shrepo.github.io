<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برا السالفة 👁️</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
    --bg-color: #0f172a;
    --text-color: white;
    --card-color: #1e293b;
    --btn-color: #3b82f6;
}
body {margin:0;font-family:system-ui;background:var(--bg-color);color:var(--text-color);text-align:center;}
.container {padding:15px;}
input, select {width:80%;padding:12px;margin:5px;border-radius:10px;border:none;}
button {width:85%;padding:14px;margin:10px;border:none;border-radius:12px;background:var(--btn-color);color:white;font-size:16px;cursor:pointer;}
.card {background:var(--card-color);padding:25px;margin:20px auto;width:90%;border-radius:15px;font-size:20px;}
.hidden {display:none;}
.top-btn {background:#ef4444;}
.correct {background-color:green !important;}
.wrong {background-color:red !important;}
#themeBtn {position:fixed;top:10px;right:10px;width:40px;height:40px;border-radius:50%;font-size:18px;}
#timer {font-size:24px;margin-bottom:15px;}
</style>
</head>
<body>

<h1>👀 برا السالفة</h1>
<button id="themeBtn" onclick="changeTheme()">🎨</button>

<div id="setup" class="container">
    <h3>أدخل أسماء اللاعبين</h3>
    <div id="players"></div>
    <button onclick="addPlayer()">➕ إضافة لاعب</button>

    <h3>اختر الفئة للجولة</h3>
    <select id="categorySelect">
        <option value="animals">حيوانات</option>
        <option value="brands">ماركات</option>
        <option value="cars">سيارات</option>
        <option value="cities">مدن</option>
        <option value="things">أشياء</option>
    </select>

    <button onclick="startGame()">🚀 ابدأ</button>
    <button class="top-btn" onclick="resetAll()">🧹 إعادة تعيين</button>
</div>

<div id="game" class="hidden">
    <h2 id="playerName"></h2>
    <div class="card" id="roleCard">اضغط لمعرفة دورك</div>
    <button onclick="nextPlayer()">التالي</button>
</div>

<div id="questions" class="hidden">
    <h2 id="qCount"></h2>
    <div class="card" id="questionBox"></div>
    <button onclick="nextQuestion()">التالي</button>
    <button onclick="skipQuestions()">⏭️ تخطي</button>
</div>

<div id="voting" class="hidden">
    <h2 id="voteQuestion"></h2>
    <div id="voteButtons"></div>
    <button onclick="submitVote()">✅ تأكيد</button>
</div>

<div id="imposterReveal" class="hidden">
    <h2>❌ الامبوستر هو: <span id="imposterName"></span></h2>
    <button onclick="startImposterAnswer()">✅ الامبوستر يختار الإجابة</button>
</div>

<div id="imposterAnswer" class="hidden">
    <h2>❌ أنت الامبوستر: اختر الإجابة الصحيحة</h2>
    <div id="timer"></div>
    <div id="imposterOptions"></div>
</div>

<div id="result" class="hidden">
    <h2 id="resultText"></h2>
    <div class="card" id="scoreBoard"></div>
    <div class="card" id="elementList"></div>
    <button onclick="newRound()">🔄 جولة جديدة</button>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>
let categories = {
    animals:["قط","فيل","كلب","بومة","زرافة","ناقه","أسد","حصان","دلفين","ذئب","نمر","تمساح","باندا","نسر","قرش","حصني","صقر","قرد","جربوع","فار","دجاجة","بطه","سلحفاة","ضفدع","ثعبان","دب قطبي","ببغاء","غراب","حمار","ضب","غزال","بطريق","خروف","اخطبوط","نمله","فراشه","ذبانه","نامس","حوت","سلطعون","بريعصي","خنفس","فقمه","شبث","عقرب"],
    brands:["نايك","اديداس","ابل","سامسونق","هواوي","ديور","ماكدونالدز","سوني","بوما","قوقل"],
    cars:["فيراري","لامبورغيني","تويوتا","مرسيدس","بي إم دبليو","هوندا","شيفروليه"],
    cities:["الرياض","جدة","مكة","الدمام","المدينة","القاهرة","دبي","أبوظبي","لندن","باريس"],
    things:["جوال","شامبو","مكيف","جنط","باب","فرن","كتاب","ساعه","لابتوب","كوب","سكوتر","مروحة","سماعة","سيارة لعبة","دفايه","وجار","سياره","طياره","قوطي","ستاره","فرشه","لمبه"]
};

let players=JSON.parse(localStorage.getItem("players")||"[]");
let points=JSON.parse(localStorage.getItem("points")||"{}");
let roles=[],current=0,outPlayer="",votes={},questionOrder=[],currentQ=0,currentVotePlayerIndex=0,selectedVote="",chosenCategory="",elementToGuess="",timerInterval,themeIndex=0;

window.onload=()=>{
    if(players.length===0) addPlayer();
    players.forEach(p=>addPlayer(p));
}

function addPlayer(name=""){
    let div=document.createElement("div");
    div.innerHTML=`<input value="${name}" placeholder="اسم اللاعب">`;
    document.getElementById("players").appendChild(div);
}

function savePlayers(){
    let inputs=document.querySelectorAll("#players input");
    players=Array.from(inputs).map(i=>i.value).filter(v=>v);
    shuffleArray(players);
    localStorage.setItem("players", JSON.stringify(players));
    players.forEach(p=>{if(!points[p]) points[p]=0});
    localStorage.setItem("points", JSON.stringify(points));
}

function startGame(){
    savePlayers();
    if(players.length<3) return alert("لازم 3 لاعبين على الأقل!");
    chosenCategory=document.getElementById("categorySelect").value;
    let elements=categories[chosenCategory];
    elementToGuess=elements[Math.floor(Math.random()*elements.length)];
    let outIndex=Math.floor(Math.random()*players.length);
    outPlayer=players[outIndex];
    roles=players.map((p,i)=> i===outIndex?"OUT":elementToGuess);
    questionOrder=[...players];
    shuffleArray(questionOrder);
    current=0; currentQ=0; currentVotePlayerIndex=0; votes={};
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    showPlayer();
}

function showPlayer(){
    document.getElementById("playerName").innerText=players[current];
    document.getElementById("roleCard").innerText="اضغط لمعرفة دورك";
}

document.getElementById("roleCard").onclick=function(){
    this.innerText=roles[current]==="OUT"?"❌ أنت برا السالفة":"🎯 "+roles[current];
}

function nextPlayer(){
    current++;
    if(current>=players.length){ startQuestions(); return; }
    showPlayer();
}

function startQuestions(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("questions").classList.remove("hidden");
    currentQ=0;
    showNextQuestion();
}

function showNextQuestion(){
    if(currentQ>=players.length){ startVoting(); return; }
    let a=questionOrder[currentQ];
    let b;
    do{b=players[Math.floor(Math.random()*players.length)];} while(a===b);
    document.getElementById("qCount").innerText=`سؤال ${currentQ+1} / ${players.length}`;
    document.getElementById("questionBox").innerText=`🎤 ${a} اسأل ${b}`;
}

function nextQuestion(){currentQ++; showNextQuestion();}
function skipQuestions(){startVoting();}

function startVoting(){
    document.getElementById("questions").classList.add("hidden");
    document.getElementById("voting").classList.remove("hidden");
    currentVotePlayerIndex=0; votes={}; selectedVote="";
    showVoteForPlayer();
}

function showVoteForPlayer(){
    if(currentVotePlayerIndex>=players.length){ revealImposter(); return; }
    let p=players[currentVotePlayerIndex];
    document.getElementById("voteQuestion").innerText=`${p} تصوت على مين؟`;
    let html="";
    players.forEach(pl=>{if(pl!==p) html+=`<button onclick="selectVote('${pl}')">${pl}</button>`;});
    document.getElementById("voteButtons").innerHTML=html;
}

function selectVote(name){selectedVote=name;}
function submitVote(){
    if(!selectedVote) return alert("اختر لاعب!");
    votes[players[currentVotePlayerIndex]]=selectedVote;
    selectedVote="";
    currentVotePlayerIndex++;
    showVoteForPlayer();
}

function revealImposter(){
    document.getElementById("voting").classList.add("hidden");
    document.getElementById("imposterName").innerText = outPlayer;
    document.getElementById("imposterReveal").classList.remove("hidden");
}

function startImposterAnswer(){
    document.getElementById("imposterReveal").classList.add("hidden");
    document.getElementById("imposterAnswer").classList.remove("hidden");
    startTimer(30);
    let options=[elementToGuess];
    let allElements=categories[chosenCategory].filter(el=>el!==elementToGuess);
    shuffleArray(allElements);
    options.push(...allElements.slice(0,9));
    shuffleArray(options);
    let html="";
    options.forEach(el=>{html+=`<button onclick="imposterChoose('${el}', this)">${el}</button>`;});
    document.getElementById("imposterOptions").innerHTML=html;
}

function startTimer(seconds){
    let timerEl=document.getElementById("timer");
    clearInterval(timerInterval);
    let time=seconds;
    timerEl.innerText=`⏱️ ${time}s`;
    timerInterval=setInterval(()=>{
        time--;
        timerEl.innerText=`⏱️ ${time}s`;
        if(time<=0){
            clearInterval(timerInterval);
            let buttons=document.querySelectorAll("#imposterOptions button");
            buttons.forEach(b=>{if(b.innerText===elementToGuess) b.classList.add("correct");});
            document.getElementById("imposterAnswer").classList.add("hidden");
            finishVote("⌛ انتهى الوقت! الامبوستر خسر النقطة.");
        }
    },1000);
}

function imposterChoose(choice, btn){
    clearInterval(timerInterval);
    if(choice===elementToGuess){
        btn.classList.add("correct");
        points[outPlayer]+=1;
        document.getElementById("correctSound").play();
    }else{
        btn.classList.add("wrong");
        document.getElementById("wrongSound").play();
        let buttons=document.querySelectorAll("#imposterOptions button");
        buttons.forEach(b=>{if(b.innerText===elementToGuess) b.classList.add("correct");});
    }
    setTimeout(()=>{
        document.getElementById("imposterAnswer").classList.add("hidden");
        let msg=choice===elementToGuess?"✅ صحيح! حصلت على نقطة.":"❌ خطأ! لم تحصل على نقطة.";
        finishVote(msg);
    },1000);
}

function finishVote(imposterMsg){
    for(let voter in votes){if(votes[voter]===outPlayer) points[voter]+=1;}
    localStorage.setItem("points", JSON.stringify(points));
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("resultText").innerText=`${imposterMsg}\nالامبوستر كان: ${outPlayer}`;
    let scoreHTML="";
    for(let p of players) scoreHTML+=`<p>${p}: ${points[p]} نقطة</p>`;
    document.getElementById("scoreBoard").innerHTML=scoreHTML;
    document.getElementById("elementList").innerText="📌 عناصر الفئة: "+categories[chosenCategory].join(", ");
}

function changeTheme(){
    themeIndex=(themeIndex+1)%3;
    if(themeIndex===0){
        document.documentElement.style.setProperty("--bg-color","#0f172a");
        document.documentElement.style.setProperty("--text-color","white");
        document.documentElement.style.setProperty("--card-color","#1e293b");
        document.documentElement.style.setProperty("--btn-color","#3b82f6");
    }else if(themeIndex===1){
        document.documentElement.style.setProperty("--bg-color","#f5f5f5");
        document.documentElement.style.setProperty("--text-color","#111");
        document.documentElement.style.setProperty("--card-color","#e0e0e0");
        document.documentElement.style.setProperty("--btn-color","#4caf50");
    }else{
        document.documentElement.style.setProperty("--bg-color","#fde68a");
        document.documentElement.style.setProperty("--text-color","#111");
        document.documentElement.style.setProperty("--card-color","#fcd34d");
        document.documentElement.style.setProperty("--btn-color","#f97316");
    }
}

function newRound(){
    document.getElementById("setup").classList.remove("hidden");
    document.getElementById("result").classList.add("hidden");
}

function resetAll(){
    localStorage.removeItem("players");
    localStorage.removeItem("points");
    location.reload();
}

function shuffleArray(array){for(let i=array.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1)); [array[i],array[j]]=[array[j],array[i]];}}
</script>
</body>
</html>
